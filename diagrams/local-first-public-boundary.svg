<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">NeXa RoVe local-first public boundary</title>
  <desc id="desc">Boundary diagram separating public showcase material from private development records and runtime internals.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172231" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#070a11" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#74f0e3"/>
      <stop offset="1" stop-color="#9fb4ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="760" fill="#03060b"/>
  <rect x="26" y="24" width="1148" height="712" rx="28" fill="url(#panel)" stroke="#d8e7f7" stroke-opacity="0.18"/>
  <text x="88" y="86" fill="#f5fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="760">Local-first public boundary</text>
  <text x="88" y="116" fill="#aebdcb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Clear separation between public showcase content and private implementation work</text>
  <path d="M88 136h1024" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.58"/>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="86" y="198" width="452" height="410" rx="24" fill="#101925" stroke="#74f0e3" stroke-opacity="0.5"/>
    <rect x="662" y="198" width="452" height="410" rx="24" fill="#0b1018" stroke="#d8e7f7" stroke-opacity="0.18"/>
    <path d="M600 188v432" stroke="url(#accent)" stroke-width="3" stroke-dasharray="10 12" stroke-opacity="0.76"/>
    <text x="312" y="250" text-anchor="middle" fill="#f5fbff" font-size="26" font-weight="760">Public website</text>
    <text x="888" y="250" text-anchor="middle" fill="#f5fbff" font-size="26" font-weight="760">Private workspace</text>
    <g fill="#c7d3df" font-size="18">
      <text x="136" y="316">Selected prototype photos</text>
      <text x="136" y="370">Public-safe diagrams</text>
      <text x="136" y="424">Bounded captions and notes</text>
      <text x="136" y="478">Intent-based demo video link</text>
      <text x="712" y="316">Runtime internals</text>
      <text x="712" y="370">Private development records</text>
      <text x="712" y="424">Detailed wiring and config</text>
      <text x="712" y="478">Unpublished experiments</text>
    </g>
    <g fill="#74f0e3">
      <circle cx="114" cy="309" r="5"/>
      <circle cx="114" cy="363" r="5"/>
      <circle cx="114" cy="417" r="5"/>
      <circle cx="114" cy="471" r="5"/>
    </g>
    <g fill="#8090a2">
      <circle cx="690" cy="309" r="5"/>
      <circle cx="690" cy="363" r="5"/>
      <circle cx="690" cy="417" r="5"/>
      <circle cx="690" cy="471" r="5"/>
    </g>
    <rect x="432" y="628" width="336" height="54" rx="27" fill="#08111b" stroke="#74f0e3" stroke-opacity="0.42"/>
    <text x="600" y="662" text-anchor="middle" fill="#c7d3df" font-size="16">Public page shows selected progress only</text>
  </g>
</svg>
