<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">NeXa RoVe public system overview</title>
  <desc id="desc">High-level public diagram showing the prototype surface, interface shell, and physical build categories.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#172231" stop-opacity="0.94"/>
      <stop offset="1" stop-color="#070b12" stop-opacity="0.96"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#74f0e3"/>
      <stop offset="1" stop-color="#9fb4ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-30%" width="140%" height="160%">
      <feGaussianBlur stdDeviation="9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="#03060b"/>
  <rect x="26" y="24" width="1148" height="712" rx="28" fill="url(#panel)" stroke="#d8e7f7" stroke-opacity="0.18"/>
  <path d="M88 126h1024" stroke="url(#accent)" stroke-width="2" stroke-opacity="0.58"/>
  <text x="88" y="86" fill="#f5fbff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="760">NeXa RoVe public system overview</text>
  <text x="88" y="116" fill="#aebdcb" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16">Public-facing prototype map, without private runtime or wiring detail</text>

  <g font-family="Inter, Segoe UI, Arial, sans-serif">
    <rect x="430" y="192" width="340" height="192" rx="22" fill="#0b121d" stroke="#74f0e3" stroke-opacity="0.54" filter="url(#glow)"/>
    <text x="600" y="252" text-anchor="middle" fill="#f8fbff" font-size="28" font-weight="760">NeXa RoVe</text>
    <text x="600" y="286" text-anchor="middle" fill="#c7d3df" font-size="17">physical prototype</text>
    <path d="M552 314c17 25 79 25 96 0" fill="none" stroke="#f8fbff" stroke-width="9" stroke-linecap="round"/>
    <rect x="546" y="224" width="20" height="58" rx="10" fill="#f8fbff"/>
    <rect x="634" y="224" width="20" height="58" rx="10" fill="#f8fbff"/>

    <g fill="#101925" stroke="#d8e7f7" stroke-opacity="0.2">
      <rect x="94" y="204" width="268" height="128" rx="18"/>
      <rect x="94" y="430" width="268" height="128" rx="18"/>
      <rect x="838" y="204" width="268" height="128" rx="18"/>
      <rect x="838" y="430" width="268" height="128" rx="18"/>
    </g>
    <g fill="#f5fbff" font-size="22" font-weight="740">
      <text x="128" y="252">Public interface shell</text>
      <text x="128" y="478">Selected build media</text>
      <text x="872" y="252">Hardware categories</text>
      <text x="872" y="478">Public documentation</text>
    </g>
    <g fill="#aebdcb" font-size="16">
      <text x="128" y="286">Face, launcher, status UI</text>
      <text x="128" y="512">Photos, captions, demo intent</text>
      <text x="872" y="286">Compute, sensing, display, audio, power</text>
      <text x="872" y="512">Overview, diagrams, bounded notes</text>
    </g>
    <g stroke="url(#accent)" stroke-width="3" stroke-linecap="round" stroke-opacity="0.78">
      <path d="M362 268h52"/>
      <path d="M786 268h52"/>
      <path d="M362 494c86 0 78-110 78-110"/>
      <path d="M838 494c-86 0-78-110-78-110"/>
    </g>
    <g fill="#74f0e3">
      <path d="M414 268l-12-7v14z"/>
      <path d="M838 268l-12-7v14z"/>
      <path d="M438 384l-9 10 14 3z"/>
      <path d="M762 384l9 10-14 3z"/>
    </g>
  </g>
</svg>
